<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>X（旧Twitter）検索コマンド生成</title>
    <style>
        :root {
            --primary-navy: #00406c;
            --primary-navy-hover: #003356;
            --border-color: #ced4da;
            --bg-gray: #f8f9fa;
            --custom-radius: 4px;
        }

        body {
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #0f1419;
        }

        .container {
            width: 70%;
            background: #fff;
            padding: 30px;
            border: 1px solid #dee2e6;
            margin-bottom: 50px;
            border-radius: var(--custom-radius);
        }

        .pageTitle {
            color: var(--primary-navy);
            font-weight: bold;
        }

        .nav-underline .nav-link {
            color: #657786;
            font-weight: bold;
        }

        .nav-underline .nav-link:hover {
            color: var(--primary-navy-hover);
        }

        .nav-underline .nav-link.active {
            color: var(--primary-navy) !important;
            border-bottom-color: var(--primary-navy) !important;
        }

        .btn,
        .form-control,
        .form-select,
        .input-group-text,
        .accordion-item,
        .modal-content,
        .toast {
            border-radius: var(--custom-radius) !important;
        }

        .btn-primary {
            background-color: var(--primary-navy) !important;
            border-color: var(--primary-navy) !important;
        }

        .btn-primary:hover {
            background-color: var(--primary-navy-hover) !important;
            border-color: var(--primary-navy-hover) !important;
        }

        .btn-outline-primary {
            color: var(--primary-navy) !important;
            border-color: var(--primary-navy) !important;
        }

        .btn-outline-primary:hover {
            background-color: var(--primary-navy) !important;
            color: #fff !important;
        }

        .form-group {
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .form-group label,
        .favNote-explain {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .validation,
        .fav-explain {
            font-size: 80%;
            color: gray;
            margin-bottom: 8px;
            line-height: 1;
        }

        .subhead {
            padding: 0.2rem 0.5rem;
            border-left: 6px solid var(--primary-navy);
        }

        .error-text {
            color: #dc3545;
            font-size: 0.875em;
            margin-top: 0.25rem;
            display: none;
        }

        .is-invalid {
            border-color: #dc3545 !important;
        }

        #favArea .cmd-text {
            white-space: pre-wrap;
            word-break: break-all;
            display: block;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1100;
        }

        @media (max-width:590px) {
            body {
                font-size: 90%;
            }

            .container {
                width: 95%;
            }

        }
    </style>
</head>

<body>
    <div class="d-flex justify-content-center">
        <span class="pageTitle h1 mt-2 mb-4">Twitter(X)検索コマンド生成</span>
    </div>

    <div class="container shadow-sm">
        <ul class="nav nav-underline justify-content-center mb-3" id="nav-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#nav-create"
                    type="button">新規作成</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#nav-favorite"
                    type="button">お気に入り</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#nav-info"
                    type="button">インフォ</button></li>
        </ul>

        <div class="tab-content" id="nav-tabContent">
            <div class="tab-pane show active" id="nav-create" role="tabpanel">

                <div class="form-group">
                    <label>ユーザー名</label>
                    <p class="validation">※半角英数字とアンダーバーのみ 15文字以内</p>
                    <div class="input-group">
                        <span class="input-group-text">@</span>
                        <input type="text" id="userName" class="form-control" placeholder="例）example_user">
                    </div>
                    <div id="error-userName" class="error-text"><i class="fa-solid fa-circle-exclamation"></i>
                        <span></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>期間</label>
                    <div class="row align-items-center">
                        <div class="col-5"><input type="date" id="dateSince" class="form-control"></div>
                        <div class="col-2 text-center">～</div>
                        <div class="col-5"><input type="date" id="dateUntil" class="form-control"></div>
                    </div>
                    <div id="error-date" class="error-text"><i class="fa-solid fa-circle-exclamation"></i> <span></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>キーワード（完全一致）</label>
                    <div class="d-flex justify-content-between">
                        <p class="validation">※20文字以内</p>
                        <span id="counter1" class="text-muted small">0/20</span>
                    </div>
                    <input type="text" id="keyword" class="form-control" placeholder="例）美味しいランチ">
                    <div id="error-keyword" class="error-text"><i class="fa-solid fa-circle-exclamation"></i>
                        <span></span>
                    </div>
                </div>

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="followee">
                    <label class="form-check-label" for="followee">フォローしている人の投稿のみ表示</label>
                </div>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="pictures">
                    <label class="form-check-label" for="pictures">画像投稿のみ表示</label>
                </div>

                <div class="accordion mb-4" id="moreOption">
                    <div class="accordion-item">
                        <h5 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                data-bs-target="#collapseOne">
                                <i class="fa-solid fa-plus me-2"></i>さらに条件を追加
                            </button>
                        </h5>
                        <div id="collapseOne" class="accordion-collapse collapse">
                            <div class="accordion-body">
                                <div class="form-group">
                                    <label>除外キーワード（完全一致）</label>
                                    <div class="d-flex justify-content-between">
                                        <p class="validation">※20文字以内</p>
                                        <span id="counter2" class="text-muted small">0/20</span>
                                    </div>
                                    <input type="text" id="removeKeyword" class="form-control"
                                        placeholder="例）3000円のランチ">
                                    <div id="error-removeKeyword" class="error-text"><i
                                            class="fa-solid fa-circle-exclamation"></i> <span></span></div>
                                </div>
                                <div class="form-group">
                                    <label>いいね数</label>
                                    <p class="validation">※8桁以内</p>
                                    <div class="row align-items-center">
                                        <div class="col-5">
                                            <input type="number" id="minFaves" class="form-control" min="0">
                                        </div>
                                        <div class="col-2 text-center">～</div>
                                        <div class="col-5">
                                            <input type="number" id="maxFaves" class="form-control" min="0">
                                        </div>
                                    </div>
                                    <div id="error-faves" class="error-text">
                                        <i class="fa-solid fa-circle-exclamation"></i> <span></span>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>返信先ユーザー</label>
                                    <p class="validation">※半角英数字とアンダーバーのみ 15文字以内</p>
                                    <div class="input-group">
                                        <span class="input-group-text">@</span>
                                        <input type="text" id="reply" class="form-control" placeholder="例）to_this_user">
                                    </div>
                                    <div id="error-reply" class="error-text"><i
                                            class="fa-solid fa-circle-exclamation"></i> <span></span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mb-5 gap-2 justify-content-center">
                    <button type="button" id="resetButton" class="btn btn-outline-primary col-4">クリア</button>
                    <button type="button" id="generateButton" class="btn btn-primary col-7">コマンドを生成</button>
                </div>

                <div class="form-group">
                    <div class="d-flex justify-content-between mb-2">
                        <label class="h5 subhead">結果</label>
                        <div>
                            <button type="button" id="favButton" class="btn btn-outline-secondary btn-sm me-2"><i
                                    class="fa-solid fa-star"></i></button>
                            <button type="button" id="copyButton" class="btn btn-outline-secondary btn-sm"><i
                                    class="fa-solid fa-copy"></i></button>
                        </div>
                    </div>
                    <textarea id="commandArea" class="form-control" rows="3" readonly></textarea>
                </div>
            </div>

            <div class="tab-pane" id="nav-favorite" role="tabpanel">
                <div class="d-flex mb-2">
                    <button type="button" id="delButton" class="btn btn-outline-primary btn-sm ms-auto">すべて削除</button>
                </div>
                <ul id="favArea" class="list-group list-group-flush"></ul>
            </div>

            <div class="tab-pane" id="nav-info" role="tabpanel">
                <div class="mb-4">要望・バグ報告などは<a href="https://forms.gle/WLJueGioScScPbuz7" target="_blank">こちら</a>から
                </div>
                <!-- <div class="h5 subhead">リリースノート</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item border-dark-subtle d-flex">2026-04-05&nbsp;&nbsp;バグを修正し、ボタンの文言を変更しました。
                    </li>
                    <li class="list-group-item border-dark-subtle d-flex">2026-04-04&nbsp;&nbsp;サイトをリリースしました。</li>
                </ul> -->
            </div>
        </div>
    </div>

    <div class="modal fade" id="saveModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">お気に入りに保存</h5><br>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label font-weight-bold favNote-explain">コマンドの説明を入力</label>
                    <div class="d-flex justify-content-between">
                        <p class="fav-explain">※30文字以内</p>
                        <span id="counterFav" class="text-muted small">0/30</span>
                    </div>
                    <p class="fav-explain">※お気に入りは15件まで保存できます。</p>
                    <textarea id="favNote" class="form-control" rows="2" placeholder="例：安いランチ検索用"></textarea>
                    <div id="error-favNote" class="error-text"><i class="fa-solid fa-circle-exclamation"></i>
                        <span></span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-primary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" id="confirmSave" class="btn btn-primary">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container">
        <div id="infoToast" class="toast align-items-center text-white bg-dark border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const STORAGE_KEY = "twitter_fav_commands_v3";
        const MAX_FAV = 15;
        const userPattern = /^[a-zA-Z0-9_]*$/;
        const saveModal = new bootstrap.Modal(document.getElementById('saveModal'));
        const infoToast = new bootstrap.Toast(document.getElementById('infoToast'));

        function showError(elementId, message) {
            const errorDiv = document.getElementById(elementId);
            if (errorDiv) {
                errorDiv.querySelector('span').textContent = message;
                errorDiv.style.display = 'block';
            }
        }

        function clearErrors() {
            document.querySelectorAll('.error-text').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.form-control').forEach(el => el.classList.remove('is-invalid'));
        }

        function validateUser(value, errorId, elementId) {
            if (value.length > 15) {
                showError(errorId, "15文字以内で入力してください");
                document.getElementById(elementId).classList.add('is-invalid');
                return true;
            }
            if (!userPattern.test(value)) {
                showError(errorId, "半角英数字とアンダーバーのみ入力できます");
                document.getElementById(elementId).classList.add('is-invalid');
                return true;
            }
            return false;
        }
        document.getElementById('generateButton').addEventListener('click', () => {
            clearErrors();
            let hasError = false;
            const form = {
                userName: document.getElementById('userName').value.trim(),
                dateSince: document.getElementById('dateSince').value,
                dateUntil: document.getElementById('dateUntil').value,
                keyword: document.getElementById('keyword').value.trim(),
                followee: document.getElementById('followee').checked,
                pictures: document.getElementById('pictures').checked,
                removeKeyword: document.getElementById('removeKeyword').value.trim(),
                minFaves: document.getElementById('minFaves').value,
                maxFaves: document.getElementById('maxFaves').value,
                reply: document.getElementById('reply').value.trim()
            };

            if (form.userName && validateUser(form.userName, 'error-userName', 'userName')) hasError = true;

            if (form.keyword.length > 20) {
                showError('error-keyword', "20文字以内で入力してください");
                document.getElementById('keyword').classList.add('is-invalid');
                hasError = true;
            }

            if (form.removeKeyword.length > 20) {
                showError('error-removeKeyword', "20文字以内で入力してください");
                document.getElementById('removeKeyword').classList.add('is-invalid');
                hasError = true;
            }

            const minFavesEl = document.getElementById('minFaves');
            const maxFavesEl = document.getElementById('maxFaves');

            if (form.minFaves.length > 8) {
                showError('error-faves', "8桁以内で入力してください");
                minFavesEl.classList.add('is-invalid');
                hasError = true;
            }
            if (form.maxFaves.length > 8) {
                showError('error-faves', "8桁以内で入力してください");
                maxFavesEl.classList.add('is-invalid');
                hasError = true;
            }

            if (!hasError && form.minFaves && form.maxFaves && Number(form.minFaves) > Number(form.maxFaves)) {
                showError('error-faves', "いいね数（最小）にはいいね数（最大）以下の数字を入力してください");
                minFavesEl.classList.add('is-invalid');
                maxFavesEl.classList.add('is-invalid');
                hasError = true;
            }

            if (form.reply && validateUser(form.reply, 'error-reply', 'reply')) hasError = true;

            if (form.dateSince && form.dateUntil && new Date(form.dateSince) > new Date(form.dateUntil)) {
                showError('error-date', "開始日には終了日以前の日付を入力してください");
                document.getElementById('dateSince').classList.add('is-invalid');
                document.getElementById('dateUntil').classList.add('is-invalid');
                hasError = true;
            }

            if (hasError) return;

            let cmd = [];
            if (form.userName) cmd.push(`from:${form.userName}`);
            if (form.dateSince) cmd.push(`since:${form.dateSince}`);
            if (form.dateUntil) cmd.push(`until:${form.dateUntil}`);
            if (form.keyword) cmd.push(`"${form.keyword}"`);
            if (form.followee) cmd.push(`filter:follows`);
            if (form.pictures) cmd.push(`filter:images`);
            if (form.removeKeyword) cmd.push(`-"${form.removeKeyword}"`);
            if (form.minFaves) cmd.push(`min_faves:${form.minFaves}`);
            if (form.maxFaves) cmd.push(`max_faves:${form.maxFaves}`);
            if (form.reply) cmd.push(`to:${form.reply}`);
            document.getElementById('commandArea').value = cmd.join(' ');
        });

        function displayFavs() {
            const favArea = document.getElementById('favArea');
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            favArea.textContent = '';

            data.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'list-group-item d-flex align-items-center';

                // 削除ボタン
                const delBtn = document.createElement('button');
                delBtn.className = 'btn text-muted me-2 p-0 mt-1';
                const delIcon = document.createElement('i');
                delIcon.classList.add('fa-solid', 'fa-xmark');
                delBtn.appendChild(delIcon);
                delBtn.onclick = () => deleteFav(index);

                // コマンドテキスト
                const span = document.createElement('span');
                span.className = 'flex-grow-1 cmd-text';
                span.textContent = item.cmd;

                // 情報ボタン
                const infoBtn = document.createElement('button');
                infoBtn.className = 'btn btn-link p-0 ms-2 text-muted mt-1';
                const infoIcon = document.createElement('i');
                infoIcon.classList.add('fa-solid', 'fa-circle-info');
                infoBtn.appendChild(infoIcon);
                infoBtn.onclick = () => showToast(item.note);

                // コピーボタン
                const cpBtn = document.createElement('button');
                cpBtn.className = 'btn btn-outline-secondary btn-sm ms-2';
                const cpIcon = document.createElement('i');
                cpIcon.classList.add('fa-solid', 'fa-copy');
                cpBtn.appendChild(cpIcon);
                cpBtn.onclick = () => copyText(item.cmd);

                li.appendChild(delBtn);
                li.appendChild(span);
                li.appendChild(infoBtn);
                li.appendChild(cpBtn);
                favArea.appendChild(li);
            });
        }

        document.getElementById('favButton').addEventListener('click', () => {
            const cmd = document.getElementById('commandArea').value;
            if (!cmd) return alert("コマンドを生成してください");
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            if (data.length >= MAX_FAV) return alert(`お気に入りは${MAX_FAV}件までしか登録できません`);
            document.getElementById('favNote').value = "";
            document.getElementById('counterFav').textContent = "0/30";
            saveModal.show();
        });

        document.getElementById('confirmSave').addEventListener('click', () => {
            clearErrors();
            let hasError = false;
            const favNote = document.getElementById('favNote').value;
            if (favNote.length > 30) {
                showError('error-favNote', "30文字以内で入力してください");
                document.getElementById('favNote').classList.add('is-invalid');
                hasError = true;
            }
            if (hasError) return;

            const cmd = document.getElementById('commandArea').value;
            const note = document.getElementById('favNote').value.trim() || "説明がありません";
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            data.push({ cmd: cmd, note: note });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            saveModal.hide();
            displayFavs();
        });

        window.showToast = (msg) => {
            document.getElementById('toastBody').textContent = msg;
            infoToast.show();
        };

        window.deleteFav = (index) => {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            data.splice(index, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            displayFavs();
        };

        document.getElementById('delButton').addEventListener('click', () => {
            if (confirm("すべて削除しますか？")) { localStorage.removeItem(STORAGE_KEY); displayFavs(); }
        });

        window.copyText = (text) => {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => alert("コピーしました！"));
        };

        document.getElementById('copyButton').addEventListener('click', () => copyText(document.getElementById('commandArea').value));

        document.getElementById('resetButton').addEventListener('click', () => {
            document.querySelectorAll('.form-control').forEach(el => el.value = "");
            document.querySelectorAll('.form-check-input').forEach(el => el.checked = false);
            clearErrors();
        });

        ['keyword', 'removeKeyword'].forEach((id, idx) => {
            document.getElementById(id).addEventListener('input', (e) => {
                document.getElementById(`counter${idx + 1}`).textContent = `${e.target.value.length}/20`;
            });
        });

        // お気に入りモーダル用のカウンター
        document.getElementById('favNote').addEventListener('input', (e) => {
            document.getElementById('counterFav').textContent = `${e.target.value.length}/30`;
        });

        displayFavs();
    </script>
</body>

</html>
